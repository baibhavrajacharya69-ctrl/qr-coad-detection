<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Attendance System</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
     
        html {
            scroll-behavior: smooth;
        }

     
        .bg-dots {
            background-color: #fef3c7;
            background-image:
                radial-gradient(circle at 15% 15%, rgba(214, 126, 126, 0.6) 0, 70px, transparent 70px),
                radial-gradient(circle at 85% 12%, rgba(147, 197, 253, 0.7) 0, 80px, transparent 80px),
                radial-gradient(circle at 18% 85%, rgba(134, 239, 172, 0.6) 0, 90px, transparent 90px),
                radial-gradient(circle at 42% 92%, rgba(249, 168, 212, 0.7) 0, 65px, transparent 65px);
            background-attachment: fixed;
        }

     
        #reader {
            border: none !important;
        }
        #reader video {
            object-fit: cover;
            border-radius: 0.75rem;
        }
    </style>
</head>

<body class="bg-dots min-h-screen p-4 md:p-8 font-sans antialiased">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black text-amber-500 tracking-tight drop-shadow-sm">
                QR Attendance System
            </h1>
            <p class="text-slate-600 font-medium mt-1">
                Scan QR codes to seamlessly track and log attendance
            </p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-start">

            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-xl">
                <h2 class="text-xl font-bold text-slate-100 mb-4 flex items-center gap-2">
                    <span>Camera Scanner</span>
                </h2>

                <div class="relative w-full aspect-video rounded-xl overflow-hidden bg-black border border-slate-800 flex items-center justify-center">
                    <div id="reader" class="w-full h-full"></div>
                </div>

                <div class="mt-4 flex items-center gap-2">
                    <span id="status-indicator" class="w-2,5 h-2,5 rounded-full bg-amber-500 animate-pulse"></span>
                    <p id="scanner-status" class="text-sm text-slate-400 font-medium">
                        Initializing system camera...
                    </p>
                </div>
            </div>

            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-xl flex flex-col h-[520px]">
                <div class="flex flex-col sm:flex-row justify-between sm:items-center gap-3 mb-4">
                    <h2 class="text-xl font-bold text-slate-100">
                        Checked In: <span id="count" class="text-amber-400 font-mono ml-1">0</span>
                    </h2>

                    <div class="flex items-center gap-2">
                        <button onclick="exportExcel()" 
                                class="bg-emerald-600 hover:bg-emerald-500 transition-colors text-white px-4 py-2 rounded-xl text-sm font-semibold cursor-pointer shadow-sm">
                            Export Excel
                        </button>
                        <button onclick="clearAttendance()" 
                                class="bg-rose-600 hover:bg-rose-500 transition-colors text-white px-4 py-2 rounded-xl text-sm font-semibold cursor-pointer shadow-sm">
                            Clear
                        </button>
                    </div>
                </div>

                <div class="flex-grow overflow-y-auto rounded-xl border border-slate-800 bg-slate-950 scrollbar-thin">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-900 sticky top-0 border-b border-slate-800 z-10">
                            <tr class="text-slate-400 text-xs font-bold uppercase tracking-wider">
                                <th class="px-4 py-3">QR Data</th>
                                <th class="px-4 py-3 text-right">Timestamp</th>
                            </tr>
                        </thead>
                        <tbody id="attendance-list" class="divide-y divide-slate-900 text-sm">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

<script>
    let attendanceData = [];
    const scannedSet = new Set();
    let html5QrCode = null;

  
    window.onload = () => {
        const savedData = localStorage.getItem("attendanceData");
        if (savedData) {
            try {
                attendanceData = JSON.parse(savedData);
                attendanceData.forEach(item => {
                    scannedSet.add(item.id);
                    addRow(item.id, item.time);
                });
                updateMetrics();
            } catch (e) {
                console.error("Error parsing local registry storage:", e);
                localStorage.removeItem("attendanceData");
            }
        }
        startScanner();
    };
    function playBeep() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();

            osc.type = "sine";
            osc.frequency.setValueAtTime(580, ctx.currentTime); 
            gain.gain.setValueAtTime(0.08, ctx.currentTime);

            osc.connect(gain);
            gain.connect(ctx.destination);
            
            osc.start();
            osc.stop(ctx.currentTime + 0.12);
        } catch (err) {
            console.warn("Audio Context blocked or unsupported by browser client.");
        }
    }

    
    function addRow(id, time) {
        const tableBody = document.getElementById("attendance-list");
        const row = document.createElement("tr");
        row.className = "hover:bg-slate-900/40 transition-colors group";

        row.innerHTML = `
            <td class="px-4 py-3 text-amber-400 font-mono font-medium truncate max-w-[220px]">
                ${id}
            </td>
            <td class="px-4 py-3 text-slate-400 font-medium text-right text-xs">
                ${time}
            </td>
        `;
        tableBody.insertBefore(row, tableBody.firstChild);
    }

   
    function onScanSuccess(decodedText) {
        const cleanData = decodedText.trim();

        if (!cleanData || scannedSet.has(cleanData)) return;

        playBeep();
        scannedSet.add(cleanData);

      
        const now = new Date();
        const currentTime = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }) + 
                            ' - ' + now.toLocaleDateString([], { month: 'short', day: 'numeric' });

        attendanceData.push({ id: cleanData, time: currentTime });
        localStorage.setItem("attendanceData", JSON.stringify(attendanceData));

        addRow(cleanData, currentTime);
        updateMetrics();

       
        updateStatus(`Checked In: ${cleanData}`, "bg-emerald-500");
    }

    function updateMetrics() {
        document.getElementById("count").innerText = attendanceData.length;
    }

    function updateStatus(message, indicatorClass = "bg-amber-500") {
        document.getElementById("scanner-status").innerText = message;
        const indicator = document.getElementById("status-indicator");
        indicator.className = `w-2.5 h-2.5 rounded-full animate-pulse ${indicatorClass}`;
    }


    function startScanner() {
        html5QrCode = new Html5Qrcode("reader");
        
        Html5Qrcode.getCameras()
            .then(devices => {
                if (devices && devices.length) {
                    const targetCamera = devices.find(device => device.label.toLowerCase().includes('back')) || devices[0];
                    
                    html5QrCode.start(
                        targetCamera.id,
                        { fps: 15, qrbox: { width: 220, height: 220 } },
                        onScanSuccess,
                        () => {} 
                    ).then(() => {
                        updateStatus("Camera streaming live", "bg-emerald-500");
                    }).catch(err => {
                        updateStatus("Failed to access media stream", "bg-rose-500");
                    });
                } else {
                    updateStatus("No hardware imaging devices located", "bg-rose-500");
                }
            })
            .catch(err => {
                updateStatus("Camera permission denied", "bg-rose-500");
            });
    }

    
    function exportExcel() {
        if (!attendanceData.length) {
            alert("No logs found to compose reports.");
            return;
        }

        const cleanReports = attendanceData.map(item => ({
            "Scanned ID / Asset": item.id,
            "Timestamp Verified": item.time
        }));

        const worksheet = XLSX.utils.json_to_sheet(cleanReports);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Attendance Log");

        const todayString = new Date().toISOString().split('T')[0];
        XLSX.writeFile(workbook, `Attendance_Report_${todayString}.xlsx`);
    }


    function clearAttendance() {
        if (!attendanceData.length) return;

        if (confirm("Are you sure you want to completely erase current attendance logs? This cannot be undone.")) {
            attendanceData = [];
            scannedSet.clear();
            localStorage.removeItem("attendanceData");

            document.getElementById("attendance-list").innerHTML = "";
            updateMetrics();
            updateStatus("Logs wiped successfully", "bg-amber-500");
        }
    }
</script>

</body>
</html>
